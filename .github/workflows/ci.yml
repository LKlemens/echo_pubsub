name: CI
run-name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Restore deps and _build cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install and compile dependencies
      run: |
        mix deps.get
        mix deps.compile

    - name: Compile
      run: mix compile --warnings-as-errors

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Restore deps and _build cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install and compile dependencies
      run: |
        mix deps.get
        mix deps.compile

    - name: Run tests
      run: mix test

  static_code_analysis:
    name: Static Code Analysis
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Restore deps and _build cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install and compile dependencies
      run: |
        mix deps.get
        mix deps.compile

    - name: Check formatting
      run: mix format --check-formatted

    - name: Credo
      run: mix credo

  dialyzer:
    name: Dialyzer
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Restore deps and _build cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install and compile dependencies
      run: |
        mix deps.get
        mix deps.compile

    - name: Restore PLT cache
      id: plt-cache
      uses: actions/cache@v4
      with:
        path: priv/plts
        key: ${{ runner.os }}-plt-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-plt-

    - name: Create PLTs
      if: steps.plt-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p priv/plts
        mix dialyzer --plt

    - name: Run Dialyzer
      run: mix dialyzer
